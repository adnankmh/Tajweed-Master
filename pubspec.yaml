name: tajweed_master_pro
description: Tajweed Master Pro V13 Enterprise Foundation - Flutter Quran Tajweed learning app with Firebase-ready architecture, admin portal blueprint, certificates, gamification, AI recitation pipeline, offline audio strategy, and cloud progress design.
publish_to: 'none'
version: 1.3.0+13

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  flutter_local_notifications: ^22.0.1
  just_audio: ^0.10.5
  quran: ^1.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/quran_uthmani.json
    - assets/icons/icon-192.png
    - assets/icons/icon-512.png

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
