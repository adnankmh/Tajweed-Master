<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="تطبيق Flutter احترافي لتعليم أحكام التلاوة والتجويد بالمصحف العثماني الملوّن والدروس والامتحانات.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tajweed Master Pro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="Icon-192.png"/>
  <link rel="manifest" href="manifest.json">
  <title>Tajweed Master Pro</title>
</head>
<body>

  <script>
    let tajweedDeferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      tajweedDeferredPrompt = event;
    });
    window.tajweedPromptInstall = async function() {
      if (!tajweedDeferredPrompt) return false;
      tajweedDeferredPrompt.prompt();
      const choice = await tajweedDeferredPrompt.userChoice;
      tajweedDeferredPrompt = null;
      return choice && choice.outcome === 'accepted';
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
