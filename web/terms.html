<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><title>شروط الاستخدام</title><body style="font-family:Arial;max-width:900px;margin:auto;line-height:1.8;padding:24px"><h1>شروط الاستخدام</h1><p>التطبيق تعليمي لمساعدة المتعلم على فهم أحكام التلاوة والتجويد. لا يغني عن التلقي والمشافهة على يد معلم مؤهل.</p><p>قبل اعتماد التلوين كتلوين رسمي للمصحف، يجب إجراء مراجعة علمية متخصصة.</p></body></html>
